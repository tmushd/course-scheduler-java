name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile sources
        run: |
          javac -d /tmp/coursescheduler-build CourseSchedulerVayunandanreddyPannalaVFP5175/src/*.java
